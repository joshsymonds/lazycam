# golangci-lint configuration for lazycam.
#
# Adapted from savecraft.gg's setup — same linter set, same defaults,
# stripped of project-specific exclusions (proto codegen, plugin tree,
# multi-binary cmd layout). This codebase is a single-binary daemon, so
# the exclusions are minimal.

version: "2"

issues:
  max-issues-per-linter: 0
  max-same-issues: 50
  new: false

formatters:
  enable:
    - goimports
    - golines

  settings:
    goimports:
      local-prefixes:
        - github.com/joshsymonds/lazycam
    golines:
      max-len: 120
      chain-split-dots: true

linters:
  default: none
  enable:
    # Essential
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused

    # Code Quality & Best Practices
    - asasalint
    - asciicheck
    - bidichk
    - gocritic
    - revive
    - godot
    - misspell
    - unconvert
    - prealloc
    - goconst
    - dupl
    - wastedassign
    - unparam
    - errname
    - usestdlibvars
    - predeclared

    # Resource Management
    - bodyclose
    - noctx
    - copyloopvar
    - nilerr
    - makezero

    # Interface & Type Safety
    - forcetypeassert
    - ireturn
    - nilnil

    # Context Handling
    - containedctx
    - contextcheck
    - fatcontext

    # Security
    - gosec

    # Testing
    - thelper
    - tparallel
    - testifylint
    - testableexamples
    - usetesting

    # Code Clarity & Complexity
    - nakedret
    - cyclop
    - gocognit
    - gocyclo
    - nestif
    - funlen

    # Error Handling
    - wrapcheck
    - errorlint
    - durationcheck

    # Code Organization
    - depguard
    - gocheckcompilerdirectives
    - gochecknoglobals
    - gochecknoinits
    - gomoddirectives
    - funcorder

    # Formatting & Style
    - whitespace
    - canonicalheader
    - goprintffuncname

    # Performance
    - intrange
    - mirror

    # Struct & Type Validation
    - musttag
    - tagliatelle
    - gochecksumtype
    - exhaustive

    # Logging
    - sloglint

    # Other Quality Checks
    - reassign
    - recvcheck
    - nosprintfhostport
    - nolintlint
    - mnd
    - varnamelen

    # Code quality enforcement
    - forbidigo
    - godox

  settings:
    cyclop:
      max-complexity: 30
      package-average: 10.0

    tagliatelle:
      case:
        rules:
          json: camel
          yaml: snake

    depguard:
      rules:
        non-test:
          files: ["!$test"]
          deny:
            - pkg: math/rand$
              desc: Use math/rand/v2 instead (Go 1.22+)
        non-main:
          files: ["!**/main.go"]
          deny:
            - pkg: log$
              desc: Use log/slog for structured logging

    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

    exhaustive:
      check:
        - switch
        - map
      default-signifies-exhaustive: true

    gochecksumtype:
      default-signifies-exhaustive: false

    funcorder:
      struct-method: false

    funlen:
      lines: 100
      statements: 50

    gocognit:
      min-complexity: 20

    gocyclo:
      min-complexity: 15

    gocritic:
      enabled-checks:
        - emptyStringTest
        - sloppyReassign
        - weakCond
        - appendCombine
        - commentedOutCode
        - deferInLoop
        - evalOrder
        - nilValReturn
        - truncateCmp
        - unnecessaryDefer
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false

    govet:
      enable-all: true
      disable:
        - fieldalignment
      settings:
        shadow:
          strict: true

    mnd:
      ignored-functions:
        - flag.*
        - os.Chmod
        - os.Mkdir.*
        - os.OpenFile
        - os.WriteFile
        - make
        - time.Sleep
        - time.Duration
        - context.WithTimeout
      ignored-numbers:
        - '10'
        - '16'
        - '32'
        - '100'
        - '1000'
        - '4096'

    varnamelen:
      min-name-length: 2
      max-distance: 5
      check-receiver: false
      check-return: true
      check-type-param: true
      ignore-names:
        - err
        - ok
        - id
        - fd
        - wd
        - ev
        - ctx
        - mu
        - n
        - d # idiomatic local for *daemon (receiver name also `d`)
        - s # idiomatic local for *liveSwitcher (receiver name also `s`)
        - p # idiomatic local for *unixSocketPublisher (receiver name also `p`)
      ignore-decls:
        - i int
        - j int
        - k int
        - n int
        - t testing.T
        - b testing.B

    nakedret:
      max-func-lines: 30

    nestif:
      min-complexity: 5

    nolintlint:
      allow-no-explanation: [funlen, gocognit, golines]
      require-explanation: true
      require-specific: true

    reassign:
      patterns: [".*"]

    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1016
        - -QF1008

    usetesting:
      os-temp-dir: true
      context-background: false
      context-todo: false

    revive:
      severity: error
      enable-all-rules: false
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id
        - name: waitgroup-by-value
        - name: use-any
        - name: useless-break
        - name: unnecessary-stmt

    forbidigo:
      analyze-types: true
      forbid:
        - pattern: '^(fmt\.Print(|f|ln)|print|println)$'
          msg: "Use structured logging (log/slog) instead of print statements"
        - pattern: '^panic$'
          msg: "NO panic() - return errors instead"
        - pattern: '^time\.Sleep$'
          msg: "NO time.Sleep() - use channels for synchronization"
        - pattern: '.*V2$'
          msg: "NO versioned function names - replace old implementations"
        - pattern: '.*v2$'
          msg: "NO versioned function names - replace old implementations"
        - pattern: '.*Old$'
          msg: "NO 'Old' prefix/suffix - delete old code"
        - pattern: '^Old.*'
          msg: "NO 'Old' prefix - delete old code"
        - pattern: '.*Deprecated$'
          msg: "NO 'Deprecated' - remove deprecated code"
        - pattern: '.*Legacy$'
          msg: "NO 'Legacy' - refactor legacy code"
        - pattern: '.*Compat$'
          msg: "NO 'Compat' - avoid compatibility layers"

    godox:
      keywords:
        - TODO
        - FIXME
        - XXX
        - HACK
        - BUG
        - OPTIMIZE

    goconst:
      min-len: 3
      min-occurrences: 3

    dupl:
      threshold: 150

    ireturn:
      allow:
        - error
        - stdlib
        - anon
        - any
        # newSwitcher legitimately returns different concrete types
        # (dryRunSwitcher / future liveSwitcher) depending on mode.
        - github.com/joshsymonds/lazycam.Switcher

    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
      ignore-package-globs:
        - testing

    unparam:
      check-exported: true

    errorlint:
      errorf: true
      errorf-multi: true
      asserts: true
      comparison: true

    sloglint:
      no-global: "all"
      context: "scope"
      static-msg: true
      no-raw-keys: false
      key-naming-case: snake

    testifylint:
      enable:
        - bool-compare
        - compares
        - empty
        - error-is-as
        - error-nil
        - expected-actual
        - require-error

    misspell:
      locale: US

  exclusions:
    warn-unused: false

    rules:
      # Stutter warning on package-level types is fine in a thin daemon.
      - text: "will be used as .* by other packages, and that stutters"
        linters:
          - revive

      # Relax linters for test files.
      - path: _test\.go
        linters:
          - bodyclose
          - cyclop
          - dupl
          - errcheck
          - funlen
          - gocyclo
          - gocognit
          - goconst
          - gosec
          - govet
          - noctx
          - wrapcheck
          - containedctx
          - forbidigo
          - ireturn
          - varnamelen
          - musttag

      # main.go is the program entry; allow a few practical sins:
      # - fmt.Print is needed by flag's PrintDefaults & error reporting;
      # - ldflags-injected vars (future versioning) need package-level globals.
      - path: main\.go
        linters:
          - forbidigo
          - gochecknoglobals
          - govet
          - mnd

      # Allow slog.New (constructor pattern, not a logger call).
      - source: 'slog\.New'
        linters:
          - forbidigo

      # Allow errors.New (constructing sentinel errors).
      - source: 'errors\.New'
        linters:
          - forbidigo

run:
  timeout: 5m
  concurrency: 0
  tests: true
  modules-download-mode: readonly
  build-tags: []
